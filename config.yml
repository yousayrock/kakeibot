# ============================================================
# 家計簿Bot 設定ファイル
# ============================================================
# このファイルを編集して、Botの動作をカスタマイズできます。
# 変更後は Bot を再起動してください。
# ============================================================

# ── Bot の基本設定 ──────────────────────────────────────────
bot:
  # 特定のチャンネルのみで動作させる場合、チャンネルIDを記入してください。
  # 例: allowed_channels: [123456789012345678, 987654321098765432]
  # 空（[]）にすると全チャンネルで動作します。
  allowed_channels: []

  # ログファイルの設定
  log_file: kakeibo.log
  log_max_bytes: 200000   # ローテーション上限サイズ（バイト）
  log_backup_count: 2     # 保持するバックアップ数

# ── カテゴリ設定 ────────────────────────────────────────────
# 支出カテゴリの一覧です。自由に追加・削除・変更できます。
# ※ 最後の「その他」は残しておくことを推奨します。
categories:
  - 食費
  - 交通費
  - 通信費
  - 消耗品費
  - 仕事経費
  - 光熱費
  - 医療費
  - 娯楽費
  - 外食費
  - 衣服費
  - 日用品
  - その他

# ── AI設定 ─────────────────────────────────────────────────
# 使用するClaudeモデルの設定です。
# 通常は変更不要です。
ai:
  model: claude-haiku-4-5-20251001
  receipt_max_tokens: 512
  intent_max_tokens: 400
  category_advice_max_tokens: 200
