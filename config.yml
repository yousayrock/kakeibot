# ============================================================
# 家計簿Bot 設定ファイル
# ============================================================
# このファイルを編集して、Botの動作をカスタマイズできます。
# 変更後は Bot を再起動してください。
# ============================================================

# ── Bot の基本設定 ──────────────────────────────────────────
bot:
  # 特定のチャンネルのみで動作させる場合、チャンネルIDを記入してください。
  # 例: allowed_channels: [123456789012345678, 987654321098765432]
  # 空（[]）にすると全チャンネルで動作します。
  allowed_channels: []

  # ログファイルの設定
  log_file: kakeibo.log
  log_max_bytes: 200000   # ローテーション上限サイズ（バイト）
  log_backup_count: 2     # 保持するバックアップ数

# ── カテゴリ設定 ────────────────────────────────────────────
# 支出カテゴリの一覧です。自由に追加・削除・変更できます。
# ※ 最後の「その他」は残しておくことを推奨します。
categories:
  # ── 売上（収入）カテゴリ ──
  - 売上収入
  - その他収入
  # ── 経費カテゴリ（確定申告対応） ──
  - 仕入・消耗品費
  - 水道光熱費
  - 通信費
  - 広告宣伝費
  - 外注費
  - 旅費交通費
  - 修繕費
  - 地代家賃
  - 保険料
  - 接待交際費
  - その他経費

# ── AI設定 ─────────────────────────────────────────────────
# 使用するClaudeモデルの設定です。
# 通常は変更不要です。
ai:
  model: claude-haiku-4-5-20251001
  receipt_max_tokens: 512
  intent_max_tokens: 400
  category_advice_max_tokens: 200

# ── 事業プロフィール（経理AIアドバイザーが参照） ──────────────
# あなたの事業内容を記入してください。経理AIの回答精度が上がります。
# 例: "飲食業。主な経費：食材費・人件費・水道光熱費・広告費。"
# 例: "宿泊清掃業。主な経費：清掃用品・リネン・光熱費・広告宣伝費・外注費。"
business_profile: ""

# ── Googleカレンダー設定 ────────────────────────────────────
calendar:
  # お店用カレンダーID
  # GoogleカレンダーのURLまたは設定→マイカレンダー→「カレンダーの設定」から確認
  # 例: xxxxx@group.calendar.google.com
  # 個人のメインカレンダーの場合は "primary" のまま
  shop_calendar_id: "primary"

  # 個人用カレンダーID（メインのGoogleカレンダーは "primary"）
  personal_calendar_id: "primary"

  # Discordリマインダーを送るユーザーID
  # DiscordでユーザーIDを確認：設定→詳細設定→開発者モードをオン→自分のアイコンを右クリック→IDをコピー
  reminder_discord_user_id: ""

  # 何分前にリマインダーを送るか
  reminder_minutes: 30
